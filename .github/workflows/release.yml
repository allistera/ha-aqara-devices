name: Build Release Asset

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to build (defaults to the selected branch)"
        required: false
        type: string
      tag:
        description: "Release tag to upload the asset to when run manually"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Create zip
        run: |
          cd custom_components/ha_aqara_devices
          zip ha-aqara-devices.zip -r ./

      - name: Upload release asset
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: custom_components/ha_aqara_devices/ha-aqara-devices.zip
          asset_name: ha-aqara-devices.zip
          tag: ${{ inputs.tag || github.ref }}
          overwrite: true
